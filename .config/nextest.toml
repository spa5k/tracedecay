[profile.ci]
fail-fast = false
retries = 0
flaky-result = "fail"
slow-timeout = { period = "10s", terminate-after = 36 }
final-status-level = "slow"

[test-groups]
windows-db-heavy = { max-threads = 16 }
windows-process-heavy = { max-threads = 8 }
windows-timing-sensitive = { max-threads = 1 }

[[profile.ci.overrides]]
filter = 'all()'
platform = { host = 'cfg(windows)' }
retries = 2
flaky-result = 'pass'

[[profile.ci.overrides]]
filter = 'binary(=codex_transcript_ingest_test) | binary(=cline_like_transcript_ingest_test) | binary(=corruption_test) | binary(=cursor_transcript_ingest_test) | binary(=db_query_test) | binary(=hermes_transcript_ingest_test) | binary(=mcp_handler_test) | binary(=mcp_server_test) | binary(=memory_test) | binary(=multi_mcp_coordination_test) | binary(=profile_storage_migration_test) | binary(=session_global_db_test) | binary(=session_lcm_compression_test) | binary(=session_lcm_payload_test) | binary(=session_lcm_query_test) | binary(=session_transcript_backfill_test) | binary(=storage_resolver_test)'
platform = { host = 'cfg(windows)' }
test-group = 'windows-db-heavy'

[[profile.ci.overrides]]
filter = 'binary(=automation_backend_test) | binary(=dashboard_api_test) | binary(=dashboard_analytics_api_test) | binary(=dashboard_automation_api_test) | binary(=dashboard_automation_config_api_test) | binary(=dashboard_automation_skills_api_test) | binary(=dashboard_code_diagnostics_api_test) | binary(=dashboard_graph_api_test) | binary(=dashboard_lcm_api_test) | binary(=dashboard_lcm_fixes_test) | binary(=dashboard_memory_curation_api_test) | binary(=dashboard_savings_api_test) | binary(=extract_worker_test) | binary(=lsp_code_diagnostics_test) | binary(=mcp_cli_serve_test) | binary(=mcp_dashboard_tool_test) | binary(=tool_first_touch_test)'
platform = { host = 'cfg(windows)' }
test-group = 'windows-process-heavy'

[[profile.ci.overrides]]
filter = 'test(=dead_code_marker_resolve_is_single_pass)'
platform = { host = 'cfg(windows)' }
test-group = 'windows-timing-sensitive'
