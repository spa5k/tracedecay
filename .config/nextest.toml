[profile.ci]
fail-fast = false
retries = 0
flaky-result = "fail"
slow-timeout = { period = "10s", terminate-after = 36 }
final-status-level = "slow"

[profile.ci.junit]
path = "junit.xml"

[test-groups]
windows-dashboard-server = { max-threads = 32 }
windows-tracedecay-init = { max-threads = 32 }
windows-init-heavy = { max-threads = 32 }
windows-profile-storage = { max-threads = 32 }
windows-session-sqlite = { max-threads = 32 }
windows-process-heavy = { max-threads = 32 }
windows-subprocess = { max-threads = 32 }
windows-memory-eval = { max-threads = 32 }
windows-timing-sensitive = { max-threads = 32 }

[[profile.ci.overrides]]
filter = 'binary(=dashboard_api_test)'
platform = { host = 'cfg(windows)' }
test-group = 'windows-dashboard-server'

[[profile.ci.overrides]]
filter = 'binary(=agent_suite) | (binary(=storage_suite) & test(/^branch_db_safety_test::/)) | (binary(=core_cli_suite) & test(/^cli_non_interactive_test::/)) | (binary(=mcp_suite) & test(/^(mcp_cli_serve_test|serve_template_path_test)::/))'
platform = { host = 'cfg(windows)' }
test-group = 'windows-tracedecay-init'

[[profile.ci.overrides]]
filter = '(binary(=automation_runner_test) & !test(~backend::)) | (binary(=storage_suite) & test(/^branch_drift_test::/)) | (binary(=core_cli_suite) & test(/^(integration_test|regression_core_engine_test|tracedecay_test)::/))'
platform = { host = 'cfg(windows)' }
test-group = 'windows-init-heavy'

[[profile.ci.overrides]]
filter = '(binary(=storage_suite) & (test(/^storage_resolver_test::/) | test(/^profile_storage_migration_test::/))) | (binary(=transcript_ingest_suite) & test(~cursor::))'
platform = { host = 'cfg(windows)' }
test-group = 'windows-profile-storage'

[[profile.ci.overrides]]
filter = 'binary(=session_suite) | (binary(=transcript_ingest_suite) & (test(~codex::) | test(~hermes::) | test(~cline_like::))) | (binary(=storage_suite) & (test(/^corruption_test::/) | test(/^db_query_test::/))) | binary(=memory_test) | (binary(=mcp_suite) & (test(/^mcp_handler_test::/) | test(/^mcp_server_test::/) | test(/^multi_mcp_coordination_test::/)))'
platform = { host = 'cfg(windows)' }
test-group = 'windows-session-sqlite'

[[profile.ci.overrides]]
filter = '(binary(=core_cli_suite) & test(/^tool_first_touch_test::/)) | (binary(=mcp_suite) & test(/^mcp_dashboard_tool_test::/)) | (binary(=hooks_lsp_suite) & (test(/^lsp_code_diagnostics_test::/) | test(/^extract_worker_test::/)))'
platform = { host = 'cfg(windows)' }
test-group = 'windows-process-heavy'

[[profile.ci.overrides]]
filter = 'binary(=automation_runner_test) & test(~backend::)'
platform = { host = 'cfg(windows)' }
test-group = 'windows-subprocess'

[[profile.ci.overrides]]
filter = 'binary(=memory_eval_test)'
platform = { host = 'cfg(windows)' }
test-group = 'windows-memory-eval'

[[profile.ci.overrides]]
filter = 'test(=graph_test::dead_code_marker_resolve_is_single_pass)'
platform = { host = 'cfg(windows)' }
test-group = 'windows-timing-sensitive'
