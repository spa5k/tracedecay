# Default benchmark queries for `tracedecay bench`.
#
# Each query simulates an agent asking for context on a real task. The harness
# runs the query through `cg.build_context(...)`, measures the bytes returned,
# and compares to a baseline that reads the full content of every file
# referenced by the resulting context. The ratio is the retrieval savings.
#
# These queries are intentionally generic — they target patterns present in
# most application codebases (CLIs, daemons, services) rather than this repo
# specifically. For tighter recall numbers on a specific project, write your
# own query file and pass it via `tracedecay bench --queries <file>`.

[[query]]
task = "How is configuration loaded at startup?"

[[query]]
task = "Where are command-line arguments parsed and dispatched?"

[[query]]
task = "How is the main entry point organized?"

[[query]]
task = "How are errors defined, wrapped, and propagated?"

[[query]]
task = "Where is logging or diagnostic output emitted?"

[[query]]
task = "How are tests organized and what test harness is used?"

[[query]]
task = "How is data persisted to disk or to a database?"

[[query]]
task = "How are async tasks or background work spawned?"

[[query]]
task = "How does the build wire up dependencies and initialize state?"

[[query]]
task = "How are public API surfaces exposed (HTTP endpoints, library exports, or CLI commands)?"
