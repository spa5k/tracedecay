# Repos exercised by scripts/mcp_probe/probe.py.
#
# Each entry needs a .tracedecay/tracedecay.db already indexed. The driver
# spawns `tracedecay serve` with cwd=path and talks JSON-RPC over stdio.
#
# Edit paths to match your machine. CI / shared setups should override via
# the TRACEDECAY_PROBE_REPOS env var (path to an alternative repos.toml).

