name: CI

on:
  push:
    branches: [master, feature/holographic-memory]
  pull_request:
    branches: [master, feature/holographic-memory]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  self-hosted-runner-approval:
    name: Self-hosted runner approval
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'run-hetzner-ci')
    runs-on: ubuntu-latest
    steps:
      - name: Block unapproved external PR
        run: |
          echo "::error::External PRs must be reviewed and labeled 'run-hetzner-ci' before Linux CI can use the Hetzner self-hosted runner."
          exit 1

  linux-test:
    name: Test Linux
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'run-hetzner-ci')
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-test

      - name: Run tests
        run: cargo test --workspace

  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ fromJSON(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: '"macos-14"'
          - name: Windows
            runner: '"windows-latest"'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-test

      - name: Run tests
        run: cargo test --workspace

  clippy:
    name: Clippy
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'run-hetzner-ci')
    runs-on: [self-hosted, linux, x64, hetzner]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  fmt:
    name: Format
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'run-hetzner-ci')
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
